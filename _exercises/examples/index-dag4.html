<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAG 4 - Søgning & Modal</title>
    <link rel="stylesheet" href="style-dag4.css" />
  </head>
  <body>
    <header>
      <h1>🎬 Min Film-app</h1>
    </header>

    <section class="search-section">
      <input type="text" id="search-input" placeholder="Søg efter film titel..." />
    </section>

    <section class="filter-section">
      <button id="show-all">Vis alle</button>
      <button id="show-action">Vis Action</button>
      <button id="show-drama">Vis Drama</button>
      <button id="show-comedy">Vis Comedy</button>
      <p id="movie-count"></p>
    </section>

    <main>
      <div id="movie-list">
        <!-- Film vises her -->
      </div>
    </main>

    <!-- Modal -->
    <dialog id="movie-modal">
      <div class="modal-content">
        <button id="close-modal" class="close-btn">✕</button>
        <div id="modal-body">
          <!-- Details vises her -->
        </div>
      </div>
    </dialog>

    <script src="app-dag4.js"></script>
  </body>
</html>
